name: Update results
on:
  schedule:
    - cron: '*/10 * * * *'  # every 10 minutes (GitHub may delay/coalesce scheduled runs under load)
  workflow_dispatch:         # allow manual run
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.x' }
      - name: Fetch results
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: python scripts/fetch_results.py
      - name: Commit changes
        run: |
          git config user.name "quiniela-bot"
          git config user.email "bot@users.noreply.github.com"
          git add results.json overrides.json
          git commit -m "auto: update results" || echo "no changes"
          git push
